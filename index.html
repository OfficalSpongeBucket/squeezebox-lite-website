<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SqueezeBox Lite</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&family=Della+Respira&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Open Sans', sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
        }

        .lite {
            font-family: 'Della Respira', serif;
            font-size: 32px;
            background: linear-gradient(90deg, #00c6ff, #00ff85);
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 10px;
        }

        .upload-box {
            margin: 40px auto;
            padding: 40px;
            width: 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: black;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="logo">
        SQUEEZEBOX <span class="lite">lite</span>
    </div>

    <div class="upload-box">
        <input type="file" id="fileInput">
        <br>
        <button id="compressBtn">Compress</button>
    </div>

</body>
</html>
