<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SqueezeBox Lite</title>

<!-- Open Sauce Font -->
<link href="https://fonts.cdnfonts.com/css/open-sauce-one" rel="stylesheet">

<style>
    body {
        background: black;
        color: white;
        font-family: 'Open Sauce One', sans-serif;
        margin: 0;
        padding: 40px;
    }

    #logo {
        width: 260px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 28px;
        margin: 0 0 10px 0;
    }

    .subtitle {
        color: #888;
        margin-bottom: 25px;
    }

    .label {
        color: #7fcaff;
        margin: 15px 0 5px 0;
        font-weight: 600;
    }

    .row {
        margin-bottom: 10px;
    }

    input[type="file"] {
        font-family: inherit;
        color: white;
    }

    .options-group {
        margin-bottom: 10px;
    }

    .options-group label {
        font-weight: normal;
        margin-right: 15px;
        cursor: pointer;
    }

    button {
        margin-top: 15px;
        padding: 8px 18px;
        background: #7fcaff;
        border: none;
        color: black;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
    }

    button:active {
        background: #4da6ff;
    }

    .result {
        margin-top: 20px;
        color: #ddd;
        white-space: pre-line;
    }

    .version {
        color: #e6c300;
        margin-top: 30px;
        font-weight: 600;
    }

    a.download-link {
        color: #7fcaff;
        text-decoration: underline;
        cursor: pointer;
    }
</style>
</head>

<body>

<img id="logo" src="logo.png" alt="SqueezeBox Lite Logo">

<h1>SqueezeBox Lite</h1>
<div class="subtitle">A lightweight, fast compression tool for low-power devices.</div>

<div class="row">
    <div class="label">Input file</div>
    <input id="file-input" type="file">
</div>

<div class="row">
    <div class="label">Compression level</div>
    <div class="options-group">
        <label><input type="radio" name="level" value="fast" checked> Fast</label>
        <label><input type="radio" name="level" value="balanced"> Balanced</label>
        <label><input type="radio" name="level" value="max"> Maximum</label>
    </div>
</div>

<div class="row">
    <div class="label">Output format</div>
    <div class="options-group">
        <label><input type="radio" name="format" value="zip" checked> .zip</label>
        <label><input type="radio" name="format" value="sqz"> .sqz</label>
    </div>
</div>

<div class="row">
    <div class="label">Options</div>
    <div class="options-group">
        <label><input type="checkbox" id="fast-mode"> Fast mode (skip extra metadata)</label><br>
        <label><input type="checkbox" id="show-sizes" checked> Show file size before/after</label><br>
        <label><input type="checkbox" id="auto-download" checked> Auto-download when done</label>
    </div>
</div>

<button id="compress-btn">Compress</button>

<div id="result" class="result"></div>

<div class="version">version 2.1 beta testing</div>

<script>
function getSelected(name) {
    const el = document.querySelector('input[name="' + name + '"]:checked');
    return el ? el.value : null;
}

function formatBytes(bytes) {
    if (bytes === 0) return "0 B";
    const units = ["B", "KB", "MB", "GB"];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(2) + " " + units[i];
}

document.getElementById('compress-btn').addEventListener('click', () => {
    const fileInput = document.getElementById('file-input');
    const result = document.getElementById('result');
    result.textContent = "";

    if (!fileInput.files || fileInput.files.length === 0) {
        result.textContent = "No file selected.";
        return;
    }

    const file = fileInput.files[0];
    const level = getSelected("level");
    const format = getSelected("format");
    const fastMode = document.getElementById('fast-mode').checked;
    const showSizes = document.getElementById('show-sizes').checked;
    const autoDownload = document.getElementById('auto-download').checked;

    const originalSize = file.size;

    let ratio = 0.7;
    if (level === "fast") ratio = 0.8;
    if (level === "balanced") ratio = 0.6;
    if (level === "max") ratio = 0.4;
    if (fastMode) ratio += 0.05;

    const compressedSize = Math.max(100, Math.floor(originalSize * ratio));

    const fakeBlob = new Blob(["SQUEEZEBOX_LITE_FAKE_DATA"], { type: "application/octet-stream" });
    const url = URL.createObjectURL(fakeBlob);

    let text = "Compression complete.\n";
    text += "Output format: " + format + "\n";
    text += "Level: " + level + (fastMode ? " (fast mode)" : "") + "\n";

    if (showSizes) {
        text += "\nOriginal size:  " + formatBytes(originalSize);
        text += "\nEstimated size: " + formatBytes(compressedSize) + "\n";
    }

    text += "\nDownload: ";

    result.textContent = text;

    const link = document.createElement("a");
    link.href = url;
    link.download = file.name.replace(/\.[^/.]+$/, "") + "." + format;
    link.textContent = link.download;
    link.className = "download-link";

    result.appendChild(link);

    if (autoDownload) {
        link.click();
    }
});
</script>

</body>
</html>
