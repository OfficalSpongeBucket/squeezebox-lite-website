<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SqueezeBox Lite</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&family=Della+Respira&family=Source+Code+Pro&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0d0d0d;
            color: #e6e6e6;
            font-family: 'Source Code Pro', monospace;
            margin: 0;
            padding: 50px;
        }

        .logo {
            font-family: 'Open Sans', sans-serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: left;
            color: #00ff85;
        }

        .lite {
            font-family: 'Della Respira', serif;
            font-size: 26px;
            background: linear-gradient(90deg, #00c6ff, #00ff85);
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 10px;
        }

        .menu {
            margin-top: 40px;
            text-align: left;
        }

        .menu-item {
            font-size: 20px;
            margin: 12px 0;
            cursor: pointer;
            color: #00ff85;
        }

        .menu-item:hover {
            color: #00c66f;
        }

        .prefix {
            color: #00ff85;
        }
    </style>
</head>

<body>

    <div class="logo">
        SQUEEZEBOX <span class="lite">lite</span>
    </div>

    <div class="menu">
        <div class="menu-item"><span class="prefix">></span> Launch Engine</div>
        <div class="menu-item"><span class="prefix">></span> About</div>
        <div class="menu-item"><span class="prefix">></span> Exit</div>
    </div>

</body>
</html>
