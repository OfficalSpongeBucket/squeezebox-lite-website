<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SqueezeBox Lite</title>

<link href="https://fonts.cdnfonts.com/css/open-sauce-one" rel="stylesheet">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        background: #ffffff;
        color: #1a1a1a;
        font-family: 'Open Sauce One', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    .logo-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 8px;
    }

    .logo-wrapper img {
        max-width: 260px;
        height: auto;
    }

    .app-shell {
        width: 100%;
        max-width: 980px;
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 16px;
        align-items: flex-start;
    }

    /* History panel */
    .history-panel {
        background: #ffffff;
        border-radius: 10px;
        padding: 12px;
        max-height: 420px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
    }

    .history-title {
        font-size: 13px;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .history-empty {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 4px;
    }

    .history-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 4px;
    }

    .history-card {
        background: #f3f4f6;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        border: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .history-filename {
        color: #111827;
        font-weight: 500;
        word-break: break-all;
    }

    .history-timestamp {
        color: #6b7280;
        font-size: 11px;
    }

    /* Compression panel */
    .compress-panel {
        background: #ffffff;
        border-radius: 12px;
        padding: 18px 20px 20px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .subtitle {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 4px;
    }

    .row {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .label {
        font-size: 13px;
        font-weight: 600;
        color: #111827;
    }

    input[type="file"] {
        font-family: inherit;
        font-size: 13px;
        color: #111827;
        background: #f9fafb;
        border-radius: 8px;
        padding: 8px;
        border: 1px solid #d1d5db;
        width: 100%;
    }

    input[type="file"]::file-selector-button {
        background: #e5f0ff;
        border: none;
        color: #1d4ed8;
        padding: 6px 10px;
        margin-right: 8px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
    }

    .options-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        font-size: 13px;
    }

    .options-group label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        color: #374151;
        font-weight: 400;
    }

    .options-group input[type="radio"],
    .options-group input[type="checkbox"] {
        accent-color: #4f8dff;
        cursor: pointer;
    }

    button {
        align-self: flex-start;
        margin-top: 4px;
        padding: 8px 18px;
        background: linear-gradient(135deg, #4f8dff, #2563eb);
        border: none;
        color: #ffffff;
        font-family: inherit;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        border-radius: 999px;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    button:hover {
        filter: brightness(1.05);
        box-shadow: 0 10px 26px rgba(37, 99, 235, 0.4);
        transform: translateY(-1px);
    }

    button:active {
        filter: brightness(0.97);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        transform: translateY(0);
    }

    .result {
        margin-top: 6px;
        color: #111827;
        font-size: 13px;
        white-space: pre-line;
        min-height: 32px;
    }

    a.download-link {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
    }

    a.download-link:hover {
        text-decoration: underline;
    }

    .version {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
        font-weight: 600;
        text-align: center;
        opacity: 0.9;
    }

    @media (max-width: 800px) {
        .app-shell {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<div class="logo-wrapper">
    <img src="image_2026-04-12_105509207.png" alt="SqueezeBox Lite Logo">
</div>

<div class="app-shell">
    <!-- History panel -->
    <aside class="history-panel">
        <div class="history-title">History</div>
        <div id="history-empty" class="history-empty">No files squeezed yet.</div>
        <div id="history-list" class="history-list"></div>
    </aside>

    <!-- Compression panel -->
    <main class="compress-panel">
        <div class="subtitle">A lightweight, modern compression tool for everyday files.</div>

        <div class="row">
            <div class="label">Input file</div>
            <input id="file-input" type="file">
        </div>

        <div class="row">
            <div class="label">Compression level</div>
            <div class="options-group">
                <label><input type="radio" name="level" value="fast" checked> Fast</label>
                <label><input type="radio" name="level" value="balanced"> Balanced</label>
                <label><input type="radio" name="level" value="max"> Maximum</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Output format</div>
            <div class="options-group">
                <label><input type="radio" name="format" value="zip" checked> .zip</label>
                <label><input type="radio" name="format" value="sqz"> .sqz</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Options</div>
            <div class="options-group" style="flex-direction: column; align-items: flex-start;">
                <label><input type="checkbox" id="fast-mode"> Fast mode (skip extra metadata)</label>
                <label><input type="checkbox" id="show-sizes" checked> Show file size before/after</label>
                <label><input type="checkbox" id="auto-download" checked> Auto-download when done</label>
            </div>
        </div>

        <button id="compress-btn">Compress</button>

        <div id="result" class="result"></div>
    </main>
</div>

<div class="version">version 2.6 beta testing</div>

<script>
function getSelected(name) {
    const el = document.querySelector('input[name="' + name + '"]:checked');
    return el ? el.value : null;
}

function formatBytes(bytes) {
    if (!bytes || bytes <= 0) return "0 B";
    const units = ["B", "KB", "MB", "GB"];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(2) + " " + units[i];
}

function formatTimestamp(date) {
    const now = new Date();
    const isToday = date.toDateString() === now.toDateString();
    const yesterday = new Date();
    yesterday.setDate(now.getDate() - 1);
    const isYesterday = date.toDateString() === yesterday.toDateString();

    let dayPart = date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    if (isToday) dayPart = "Today";
    else if (isYesterday) dayPart = "Yesterday";

    const timePart = date.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    return dayPart + " " + timePart;
}

function loadHistory() {
    const listEl = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');
    listEl.innerHTML = "";

    let history = [];
    try {
        const raw = localStorage.getItem('squeezebox_history');
        if (raw) history = JSON.parse(raw);
    } catch (e) {
        history = [];
    }

    if (!history.length) {
        emptyEl.style.display = "block";
        return;
    }

    emptyEl.style.display = "none";

    history
        .sort((a, b) => b.timestamp - a.timestamp)
        .forEach(entry => {
            const card = document.createElement('div');
            card.className = 'history-card';

            const nameEl = document.createElement('div');
            nameEl.className = 'history-filename';
            nameEl.textContent = entry.outputName || entry.fileName;

            const timeEl = document.createElement('div');
            timeEl.className = 'history-timestamp';
            timeEl.textContent = formatTimestamp(new Date(entry.timestamp));

            card.appendChild(nameEl);
            card.appendChild(timeEl);
            listEl.appendChild(card);
        });
}

function saveHistoryEntry(entry) {
    let history = [];
    try {
        const raw = localStorage.getItem('squeezebox_history');
        if (raw) history = JSON.parse(raw);
    } catch (e) {
        history = [];
    }

    history.push(entry);

    if (history.length > 30) {
        history = history.slice(history.length - 30);
    }

    localStorage.setItem('squeezebox_history', JSON.stringify(history));
    loadHistory();
}

document.getElementById('compress-btn').addEventListener('click', () => {
    const fileInput = document.getElementById('file-input');
    const result = document.getElementById('result');
    result.textContent = "";

    if (!fileInput.files || fileInput.files.length === 0) {
        result.textContent = "No file selected.";
        return;
    }

    const file = fileInput.files[0];
    const level = getSelected("level");
    const format = getSelected("format");
    const fastMode = document.getElementById('fast-mode').checked;
    const showSizes = document.getElementById('show-sizes').checked;
    const autoDownload = document.getElementById('auto-download').checked;

    const originalSize = file.size;

    // Fake compression ratio (still demo logic for 2.6)
    let ratio = 0.7;
    if (level === "fast") ratio = 0.8;
    if (level === "balanced") ratio = 0.6;
    if (level === "max") ratio = 0.4;
    if (fastMode) ratio += 0.05;

    const compressedSize = Math.max(100, Math.floor(originalSize * ratio));

    const fakeBlob = new Blob(["SQUEEZEBOX_LITE_FAKE_DATA"], { type: "application/octet-stream" });
    const url = URL.createObjectURL(fakeBlob);

    const baseName = file.name.replace(/\.[^/.]+$/, "");
    const outputName = baseName + "." + format;

    let text = "Compression complete.\n";
    text += "Output: " + outputName + "\n";
    text += "Level: " + level + (fastMode ? " (fast mode)" : "") + "\n";

    if (showSizes) {
        text += "\nOriginal size:  " + formatBytes(originalSize);
        text += "\nEstimated size: " + formatBytes(compressedSize) + "\n";
    }

    text += "\nDownload: ";

    result.textContent = text;

    const link = document.createElement("a");
    link.href = url;
    link.download = outputName;
    link.textContent = outputName;
    link.className = "download-link";

    result.appendChild(link);

    saveHistoryEntry({
        fileName: file.name,
        outputName: outputName,
        timestamp: Date.now()
    });

    if (autoDownload) {
        link.click();
    }
});

loadHistory();
</script>

</body>
</html>
