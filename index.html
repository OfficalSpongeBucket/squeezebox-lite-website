<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SqueezeBox Lite</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Source Code Pro', monospace;
            margin: 0;
            padding: 60px;
        }

        .menu-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: left;
            color: #ffffff;
        }

        .divider {
            width: 320px;
            height: 2px;
            background: #2a2a2a;
            margin-bottom: 30px;
        }

        .menu {
            text-align: left;
        }

        .menu-item {
            font-size: 18px;
            margin: 14px 0;
            cursor: pointer;
            color: #d0d0d0;
        }

        .menu-item:hover {
            color: #ffffff;
        }

        .prefix {
            color: #ffffff;
            margin-right: 6px;
        }
    </style>
</head>

<body>

    <div class="menu-title">SqueezeBox Lite Engine</div>
    <div class="divider"></div>

    <div class="menu">
        <div class="menu-item"><span class="prefix">></span> Launch Engine</div>
        <div class="menu-item"><span class="prefix">></span> About</div>
        <div class="menu-item"><span class="prefix">></span> Exit</div>
    </div>

</body>
</html>
