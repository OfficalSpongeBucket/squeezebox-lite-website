<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SqueezeBox Lite</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&family=Della+Respira&display=swap" rel="stylesheet">

    <style>
        body {
            background: #111;
            color: white;
            font-family: 'Open Sans', sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        .logo {
            font-size: 50px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .lite {
            font-family: 'Della Respira', serif;
            font-size: 26px;
            background: linear-gradient(90deg, #00c6ff, #00ff85);
            -webkit-background-clip: text;
            color: transparent;
            margin-left: 8px;
            vertical-align: middle;
        }

        .upload-box {
            margin: 50px auto;
            padding: 40px;
            width: 380px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 4px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        button {
            margin-top: 25px;
            padding: 14px 40px;
            font-size: 18px;
            border: none;
            border-radius: 4px;
            background: #00ff85;
            color: #111;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00c66f;
        }
    </style>
</head>

<body>

    <div class="logo">
        SQUEEZEBOX <span class="lite">lite</span>
    </div>

    <div class="upload-box">
        <div>Select a file to compress:</div>
        <input type="file" id="fileInput">
        <br>
        <button id="compressBtn">Compress</button>
    </div>

</body>
</html>
