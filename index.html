<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SqueezeBox Lite</title>

<link href="https://fonts.cdnfonts.com/css/open-sauce-one" rel="stylesheet">

<style>
    * { box-sizing: border-box; }

    body {
        background: #ffffff;
        color: #1a1a1a;
        font-family: 'Open Sauce One', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    /* Hint text */
    #hint-text {
        position: fixed;
        bottom: 20px;
        left: 20px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.4s ease;
        color: #ffffff;
        background: rgba(0,0,0,0.4);
        padding: 6px 12px;
        border-radius: 8px;
        pointer-events: none;
        z-index: 100;
    }
    #hint-text.visible { opacity: 1; }

    /* I'm bored bubble */
    #bored-bubble {
        position: fixed;
        bottom: 80px;
        left: 20px;
        background: #2563eb;
        color: white;
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 14px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.25s ease, transform 0.25s ease;
        cursor: pointer;
        z-index: 100;
    }
    #bored-bubble.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* Snake window */
    #snake-window {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 260px;
        height: 320px;
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    #snake-window.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        pointer-events: auto;
    }

    .machine-bg {
        width: 100%;
        height: 100%;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        object-fit: cover;
    }

    #snake-canvas {
        position: relative;
        z-index: 1;
        margin-top: 60px;
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 4px;
    }

    #snake-close {
        position: absolute;
        top: 8px;
        right: 10px;
        z-index: 2;
        background: rgba(0,0,0,0.4);
        color: white;
        border: none;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: none;
        line-height: 1;
    }
    #snake-close:hover {
        background: rgba(0,0,0,0.65);
        transform: none;
        filter: none;
        box-shadow: none;
    }

    /* Easter Egg background */
    body.easter-egg-bg {
        background-image: url("lite 2.8 logo.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .logo-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 8px;
    }

    .logo-wrapper img {
        max-width: 260px;
        height: auto;
    }

    .app-shell {
        width: 100%;
        max-width: 980px;
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 16px;
        align-items: flex-start;
    }

    .history-panel {
        background: #ffffff;
        border-radius: 10px;
        padding: 12px;
        max-height: 420px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
    }

    .history-title {
        font-size: 13px;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .history-empty {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 4px;
    }

    .history-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 4px;
    }

    .history-card {
        background: #f3f4f6;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        border: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .history-filename {
        color: #111827;
        font-weight: 500;
        word-break: break-all;
    }

    .history-timestamp {
        color: #6b7280;
        font-size: 11px;
    }

    .compress-panel {
        background: #ffffff;
        border-radius: 12px;
        padding: 18px 20px 20px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .subtitle {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 4px;
    }

    .row {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .label {
        font-size: 13px;
        font-weight: 600;
        color: #111827;
    }

    input[type="file"] {
        font-family: inherit;
        font-size: 13px;
        color: #111827;
        background: #f9fafb;
        border-radius: 8px;
        padding: 8px;
        border: 1px solid #d1d5db;
        width: 100%;
    }

    input[type="file"]::file-selector-button {
        background: #e5f0ff;
        border: none;
        color: #1d4ed8;
        padding: 6px 10px;
        margin-right: 8px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
    }

    .options-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        font-size: 13px;
    }

    .options-group label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        color: #374151;
        font-weight: 400;
    }

    .options-group input[type="radio"],
    .options-group input[type="checkbox"] {
        accent-color: #4f8dff;
        cursor: pointer;
    }

    button {
        align-self: flex-start;
        margin-top: 4px;
        padding: 8px 18px;
        background: linear-gradient(135deg, #4f8dff, #2563eb);
        border: none;
        color: #ffffff;
        font-family: inherit;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        border-radius: 999px;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    button:hover {
        filter: brightness(1.05);
        box-shadow: 0 10px 26px rgba(37, 99, 235, 0.4);
        transform: translateY(-1px);
    }

    button:active {
        filter: brightness(0.97);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        transform: translateY(0);
    }

    .result {
        margin-top: 6px;
        color: #111827;
        font-size: 13px;
        white-space: pre-line;
        min-height: 32px;
    }

    a.download-link {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
    }

    a.download-link:hover { text-decoration: underline; }

    .version {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
        font-weight: 600;
        text-align: center;
        opacity: 0.9;
    }

    @media (max-width: 800px) {
        .app-shell { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<div id="hint-text">Try holding the Run button</div>
<div id="bored-bubble">I'm bored</div>

<div id="snake-window">
    <img src="machine.png" class="machine-bg" alt="">
    <button id="snake-close" title="Close">✕</button>
    <canvas id="snake-canvas" width="200" height="200"></canvas>
</div>

<div class="logo-wrapper">
    <img src="lite 2.8 logo.png" alt="SqueezeBox Lite Logo">
</div>

<div class="app-shell">
    <aside class="history-panel">
        <div class="history-title">History</div>
        <div id="history-empty" class="history-empty">No files squeezed yet.</div>
        <div id="history-list" class="history-list"></div>
    </aside>

    <main class="compress-panel">
        <div class="subtitle">A lightweight, modern compression tool for everyday files.</div>

        <div class="row">
            <div class="label">Mode</div>
            <div class="options-group">
                <label><input type="radio" name="mode" value="compress" checked> Compress</label>
                <label><input type="radio" name="mode" value="decompress"> Decompress</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Input file</div>
            <input id="file-input" type="file">
        </div>

        <div id="compress-warning"
             style="display:none; background:#fff7d6; border:1px solid #f5d27a;
                    padding:10px 12px; border-radius:8px; font-size:12px; color:#7a5a00;">
            ⚠️ This file is unlikely to compress. It may even get bigger.
        </div>

        <div class="row">
            <div class="label">Compression level</div>
            <div class="options-group">
                <label><input type="radio" name="level" value="fast" checked> Fast</label>
                <label><input type="radio" name="level" value="balanced"> Balanced</label>
                <label><input type="radio" name="level" value="max"> Maximum</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Output format</div>
            <div class="options-group">
                <label><input type="radio" name="format" value="zip" checked> .zip</label>
                <label><input type="radio" name="format" value="sqz"> .sqz</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Options</div>
            <div class="options-group" style="flex-direction: column; align-items: flex-start;">
                <label><input type="checkbox" id="fast-mode"> Fast mode (skip extra metadata)</label>
                <label><input type="checkbox" id="show-sizes" checked> Show file size before/after</label>
                <label><input type="checkbox" id="auto-download" checked> Auto-download when done</label>
            </div>
        </div>

        <button id="compress-btn">Run</button>

        <div id="result" class="result"></div>
    </main>
</div>

<div class="version">version 2.8</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
/* ─── DECLARATIONS (all at top — prevents let temporal dead zone errors) ─── */
const runBtn      = document.getElementById("compress-btn");
const bubble      = document.getElementById("bored-bubble");
const hint        = document.getElementById("hint-text");
const snakeWindow = document.getElementById("snake-window");
const snakeCanvas = document.getElementById("snake-canvas");
const snakeClose  = document.getElementById("snake-close");
const ctx         = snakeCanvas.getContext("2d");
const warningBox  = document.getElementById("compress-warning");

// Snake state
let snake        = [{ x: 10, y: 10 }];
let food         = { x: 5, y: 5 };
let dx           = 1;
let dy           = 0;
let snakeStarted = false;
const GRID       = 20;
const TILE       = 10;

/* ─── SNAKE GAME ─── */
function drawSnake() {
    ctx.fillStyle = "#4f8dff";
    snake.forEach(p => ctx.fillRect(p.x * TILE, p.y * TILE, TILE - 1, TILE - 1));
}

function drawFood() {
    ctx.fillStyle = "#ff4747";
    ctx.fillRect(food.x * TILE, food.y * TILE, TILE - 1, TILE - 1);
}

function moveSnake() {
    const head = {
        x: (snake[0].x + dx + GRID) % GRID,
        y: (snake[0].y + dy + GRID) % GRID
    };
    // Self-collision → reset
    if (snake.some(p => p.x === head.x && p.y === head.y)) {
        snake = [{ x: 10, y: 10 }];
        dx = 1; dy = 0;
        return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
        food = {
            x: Math.floor(Math.random() * GRID),
            y: Math.floor(Math.random() * GRID)
        };
    } else {
        snake.pop();
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);
    moveSnake();
    drawSnake();
    drawFood();
}

function startSnake() {
    if (snakeStarted) return;
    snakeStarted = true;
    setInterval(gameLoop, 120);
}

document.addEventListener("keydown", e => {
    if      (e.key === "ArrowUp"    && dy === 0) { dx = 0;  dy = -1; e.preventDefault(); }
    else if (e.key === "ArrowDown"  && dy === 0) { dx = 0;  dy =  1; e.preventDefault(); }
    else if (e.key === "ArrowLeft"  && dx === 0) { dx = -1; dy =  0; e.preventDefault(); }
    else if (e.key === "ArrowRight" && dx === 0) { dx =  1; dy =  0; e.preventDefault(); }
});

/* ─── EASTER EGG SYSTEM ─── */
setTimeout(() => hint.classList.add("visible"), 5000);

let holdTimeout = null;
runBtn.addEventListener("mousedown", () => {
    holdTimeout = setTimeout(() => bubble.classList.add("visible"), 1500);
});
runBtn.addEventListener("mouseup",    () => clearTimeout(holdTimeout));
runBtn.addEventListener("mouseleave", () => clearTimeout(holdTimeout));

function activateEasterEgg() {
    bubble.classList.remove("visible");
    hint.classList.remove("visible");
    localStorage.setItem("sblite_easter_egg_enabled", "true");
    document.body.classList.add("easter-egg-bg");
    snakeWindow.classList.add("active");
    startSnake();
}

bubble.addEventListener("click", activateEasterEgg);

snakeClose.addEventListener("click", () => {
    snakeWindow.classList.remove("active");
});

// Auto-enable if previously activated
if (localStorage.getItem("sblite_easter_egg_enabled") === "true") {
    document.body.classList.add("easter-egg-bg");
    snakeWindow.classList.add("active");
    startSnake();
}

/* ─── WARNING SYSTEM ─── */
document.getElementById("file-input").addEventListener("change", () => {
    const file = document.getElementById("file-input").files[0];
    if (!file) { warningBox.style.display = "none"; return; }
    const ext = file.name.toLowerCase().split(".").pop();
    const alreadyCompressed = [
        "png","jpg","jpeg","gif","mp4","mov","zip","rar","7z",
        "pdf","mp3","ogg","docx","xlsx","pptx","webp"
    ];
    warningBox.style.display =
        (alreadyCompressed.includes(ext) || file.size < 2000) ? "block" : "none";
});

/* ─── HISTORY SYSTEM ─── */
function formatTimestamp(date) {
    const now = new Date();
    const yesterday = new Date();
    yesterday.setDate(now.getDate() - 1);
    let dayPart = date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    if (date.toDateString() === now.toDateString())            dayPart = "Today";
    else if (date.toDateString() === yesterday.toDateString()) dayPart = "Yesterday";
    return dayPart + " " + date.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

function loadHistory() {
    const listEl  = document.getElementById("history-list");
    const emptyEl = document.getElementById("history-empty");
    listEl.innerHTML = "";
    const history = JSON.parse(localStorage.getItem("squeezebox_history") || "[]");
    if (!history.length) { emptyEl.style.display = "block"; return; }
    emptyEl.style.display = "none";
    history.sort((a, b) => b.timestamp - a.timestamp).forEach(entry => {
        const card   = document.createElement("div");
        card.className = "history-card";
        const nameEl = document.createElement("div");
        nameEl.className = "history-filename";
        nameEl.textContent = entry.outputName;
        const timeEl = document.createElement("div");
        timeEl.className = "history-timestamp";
        timeEl.textContent = formatTimestamp(new Date(entry.timestamp));
        card.appendChild(nameEl);
        card.appendChild(timeEl);
        listEl.appendChild(card);
    });
}

function saveHistoryEntry(entry) {
    let history = JSON.parse(localStorage.getItem("squeezebox_history") || "[]");
    history.push(entry);
    if (history.length > 30) history = history.slice(-30);
    localStorage.setItem("squeezebox_history", JSON.stringify(history));
    loadHistory();
}

/* ─── COMPRESSION / DECOMPRESSION ─── */
function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result);
        reader.onerror = e => reject(e);
        reader.readAsArrayBuffer(file);
    });
}

document.getElementById("compress-btn").addEventListener("click", async () => {
    const fileInput   = document.getElementById("file-input");
    const result      = document.getElementById("result");
    result.textContent = "";

    if (!fileInput.files.length) { result.textContent = "No file selected."; return; }

    const file         = fileInput.files[0];
    const mode         = document.querySelector('input[name="mode"]:checked').value;
    const level        = document.querySelector('input[name="level"]:checked').value;
    const format       = document.querySelector('input[name="format"]:checked').value;
    const showSizes    = document.getElementById("show-sizes").checked;
    const autoDownload = document.getElementById("auto-download").checked;

    try {
        const data = await readFileAsArrayBuffer(file);

        if (mode === "compress") {
            const zip = new JSZip();
            zip.file(file.name, data);
            const blob = await zip.generateAsync({
                type: "blob",
                compression: level === "fast" ? "STORE" : "DEFLATE",
                compressionOptions: level === "max"      ? { level: 9 } :
                                    level === "balanced" ? { level: 5 } : { level: 1 }
            });
            const outputName = file.name.replace(/\.[^/.]+$/, "") + "." + format;
            let text = "Compression complete.\nOutput: " + outputName + "\n";
            if (showSizes) {
                text += "\nOriginal size:   " + file.size + " bytes";
                text += "\nCompressed size: " + blob.size + " bytes\n";
            }
            text += "\nDownload: ";
            result.textContent = text;
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = outputName;
            link.textContent = outputName;
            link.className = "download-link";
            result.appendChild(link);
            saveHistoryEntry({ outputName, timestamp: Date.now() });
            if (autoDownload) link.click();

        } else {
            const zip   = await JSZip.loadAsync(data);
            const files = Object.keys(zip.files).filter(n => !zip.files[n].dir);
            if (files.length !== 1) {
                result.textContent = "This archive contains multiple files. Only single-file archives are supported.";
                return;
            }
            const entry      = zip.files[files[0]];
            const innerBlob  = new Blob([await entry.async("arraybuffer")]);
            const outputName = entry.name;
            let text = "Decompression complete.\nOutput: " + outputName + "\n";
            if (showSizes) {
                text += "\nArchive size:   " + file.size + " bytes";
                text += "\nExtracted size: " + innerBlob.size + " bytes\n";
            }
            text += "\nDownload: ";
            result.textContent = text;
            const link = document.createElement("a");
            link.href = URL.createObjectURL(innerBlob);
            link.download = outputName;
            link.textContent = outputName;
            link.className = "download-link";
            result.appendChild(link);
            saveHistoryEntry({ outputName, timestamp: Date.now() });
            if (autoDownload) link.click();
        }

    } catch (err) {
        console.error(err);
        result.textContent = "Something went wrong while processing this file.";
    }
});

loadHistory();
</script>

</body>
</html>
