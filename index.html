<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SqueezeBox Lite 2.8 – Easter Egg</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      transition: background-image 0.4s ease, opacity 0.4s ease;
    }

    /* Easter Egg background (permanent once unlocked) */
    body.easter-egg-bg {
      background-image: url('lite 2.8 logo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.2;
    }

    /* Cryptic hint */
    #hint-text {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 14px;
      opacity: 0.6;
      pointer-events: none;
    }

    /* Run button */
    #run-btn {
      position: fixed;
      bottom: 80px;
      left: 20px;
      padding: 12px 28px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #2979ff;
      color: white;
      cursor: pointer;
    }

    /* "I'm bored" bubble */
    #bored-bubble {
      position: fixed;
      bottom: 130px;
      left: 20px;
      background: white;
      padding: 6px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      font-size: 14px;
    }

    #bored-bubble.visible {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    /* Floating Snake window (machine module) */
    #snake-window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 380px;
      display: none;
      pointer-events: none;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    }

    #snake-window.active {
      display: block;
      pointer-events: auto;
    }

    /* Machine background image */
    #snake-window .machine-bg {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Snake canvas floating above the bar */
    #snake-canvas {
      position: absolute;
      top: 110px; /* tweak this to align with your bar */
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: transparent;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      image-rendering: pixelated;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- Cryptic hint -->
  <div id="hint-text">Try holding some buttons</div>

  <!-- Main Run button -->
  <button id="run-btn">Run</button>

  <!-- Bubble that appears after holding -->
  <div id="bored-bubble">I'm bored</div>

  <!-- Floating Snake window -->
  <div id="snake-window">
    <img src="machine.png" class="machine-bg" alt="">
    <canvas id="snake-canvas" width="200" height="200"></canvas>
  </div>

  <script>
    const EGG_KEY = 'sblite_easter_egg_enabled';

    const runBtn = document.getElementById('run-btn');
    const bubble = document.getElementById('bored-bubble');
    const snakeWindow = document.getElementById('snake-window');
    const canvas = document.getElementById('snake-canvas');
    const ctx = canvas.getContext('2d');

    // Apply Easter Egg mode on load if previously unlocked
    if (localStorage.getItem(EGG_KEY) === 'true') {
      document.body.classList.add('easter-egg-bg');
    }

    // Hold-to-show "I'm bored"
    let holdTimeout = null;

    function startHold() {
      holdTimeout = setTimeout(() => {
        bubble.classList.add('visible');
      }, 1500);
    }

    function cancelHold() {
      if (holdTimeout) {
        clearTimeout(holdTimeout);
        holdTimeout = null;
      }
    }

    runBtn.addEventListener('mousedown', startHold);
    runBtn.addEventListener('touchstart', startHold);

    ['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(ev => {
      runBtn.addEventListener(ev, cancelHold);
    });

    // Click "I'm bored" → activate Easter Egg
    bubble.addEventListener('click', () => {
      bubble.classList.remove('visible');

      // Permanently enable Easter Egg for this browser
      localStorage.setItem(EGG_KEY, 'true');
      document.body.classList.add('easter-egg-bg');

      // Show Snake window
      snakeWindow.classList.add('active');

      startSnake();
    });

    // ----------------------
    // Snake game
    // ----------------------
    const grid = 20;
    const cell = canvas.width / grid;

    let snake, dir, nextDir, food;
    let overlay = [];
    let revealed = 0;
    const totalCells = grid * grid;

    const logo = new Image();
    logo.src = 'lite 2.8 logo.png';

    let loopId = null;
    const stepInterval = 120;
    let lastTime = 0;

    function initOverlay() {
      overlay = [];
      for (let y = 0; y < grid; y++) {
        const row = [];
        for (let x = 0; x < grid; x++) row.push(1);
        overlay.push(row);
      }
      revealed = 0;
    }

    function reveal(x, y) {
      if (x < 0 || y < 0 || x >= grid || y >= grid) return;
      if (overlay[y][x] === 1) {
        overlay[y][x] = 0;
        revealed++;
      }
    }

    function placeFood() {
      while (true) {
        const x = Math.floor(Math.random() * grid);
        const y = Math.floor(Math.random() * grid);
        if (!snake.some(s => s.x === x && s.y === y)) {
          food = { x, y };
          return;
        }
      }
    }

    function resetSnake() {
      snake = [
        { x: 5, y: 10 },
        { x: 4, y: 10 },
        { x: 3, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      initOverlay();
      placeFood();
    }

    function drawSnake() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw logo
      ctx.drawImage(logo, 0, 0, canvas.width, canvas.height);

      // Dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Reveal cells
      ctx.globalCompositeOperation = 'destination-out';
      for (let y = 0; y < grid; y++) {
        for (let x = 0; x < grid; x++) {
          if (overlay[y][x] === 0) {
            ctx.fillRect(x * cell, y * cell, cell, cell);
          }
        }
      }
      ctx.globalCompositeOperation = 'source-over';

      // Draw snake
      ctx.fillStyle = '#ffffff';
      snake.forEach(s => {
        ctx.fillRect(s.x * cell, s.y * cell, cell, cell);
      });

      // Draw food
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(food.x * cell, food.y * cell, cell, cell);
    }

    function stepSnake() {
      dir = nextDir;

      const head = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      // Wall or self collision → reset
      if (
        newHead.x < 0 || newHead.x >= grid ||
        newHead.y < 0 || newHead.y >= grid ||
        snake.some(s => s.x === newHead.x && s.y === newHead.y)
      ) {
        resetSnake();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        placeFood();
      } else {
        snake.pop();
      }

      reveal(newHead.x, newHead.y);
      drawSnake();
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && dir.y !== 1) nextDir = { x: 0, y: -1 };
      if (e.key === 'ArrowDown' && dir.y !== -1) nextDir = { x: 0, y: 1 };
      if (e.key === 'ArrowLeft' && dir.x !== 1) nextDir = { x: -1, y: 0 };
      if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x: 1, y: 0 };
    });

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = timestamp - lastTime;
      if (delta >= stepInterval) {
        stepSnake();
        lastTime = timestamp;
      }
      loopId = requestAnimationFrame(loop);
    }

    function startSnake() {
      if (loopId) cancelAnimationFrame(loopId);
      logo.onload = () => {
        resetSnake();
        lastTime = 0;
        loopId = requestAnimationFrame(loop);
      };
      if (logo.complete) {
        resetSnake();
        lastTime = 0;
        loopId = requestAnimationFrame(loop);
      }
    }
  </script>
</body>
</html>
